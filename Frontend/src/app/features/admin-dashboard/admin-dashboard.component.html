<app-shadow-box>
  <div class="admin-dashboard">
    <table class="admin-table">
      <thead>
        <tr>
          <th>User</th>
          <th>Desk</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let b of bookings()">
          <td>{{ b.user }}</td>
          <td>{{ b.deskId }}</td>
          <td>{{ b.date | date }}</td>
          <td>
            <app-action-button
              [config]="getEditActionConfig()"
              (action)="startEdit(b)"
            ></app-action-button>
            <app-action-button
              [config]="getDeleteActionConfig(b)"
              [isLoading]="deletingBookingKey() === getBookingKey(b)"
              (action)="deleteBooking(b)"
            ></app-action-button>
          </td>
        </tr>
      </tbody>
    </table>

    <app-action-button
      class="create-btn"
      [config]="getCreateActionConfig()"
      (action)="startCreate()"
    ></app-action-button>

    <div class="modal" *ngIf="editingBooking() as booking">
      <div class="modal-content">
        <h3>{{ creating() ? "Create Booking" : "Edit Booking" }}</h3>

        <label>User:</label>
        <input
          type="text"
          list="users-list"
          [(ngModel)]="userSearch"
          (ngModelChange)="booking.user = $event"
          placeholder="Type or choose a user"
        />
        <datalist id="users-list">
          <option *ngFor="let u of allUsers" [value]="u"></option>
        </datalist>

        <label>Office Group:</label>
        <select
          [ngModel]="selectedGroup()"
          (ngModelChange)="updateGroup($event)"
        >
          <option *ngFor="let g of officeGroups" [value]="g">{{ g }}</option>
        </select>

        <label>Desk Number:</label>
        <select
          [ngModel]="selectedNumber()"
          (ngModelChange)="updateNumber($event)"
        >
          <option *ngFor="let n of deskNumbers" [value]="n">{{ n }}</option>
        </select>

        <p>
          Selected Desk:
          <strong>{{ selectedGroup() }}{{ selectedNumber() }}</strong>
        </p>

        <label>Date:</label>
        <input
          type="date"
          [min]="todayString"
          [ngModel]="booking.date | date: 'yyyy-MM-dd'"
          (ngModelChange)="updateDate($event)"
        />

        <div class="modal-actions">
          <app-action-button
            [config]="getSaveActionConfig()"
            [isLoading]="saveLoading()"
            (action)="saveBooking()"
          ></app-action-button>
          <app-action-button
            [config]="getCancelActionConfig()"
            (action)="cancelEdit()"
          ></app-action-button>
        </div>
        <div class="error-text" *ngIf="errorMessage()">
          {{ errorMessage() }}
        </div>
      </div>
    </div>
  </div>
</app-shadow-box>
